# Pretraining yaml for alloy qwen3-next-340m-dense under MindSpeed-MM (FSDP2).
#
# Matches: examples/configs/qwen3_next_340m_dense.json
#   - 24 layers in canonical 3:1 GDN/attention pattern (18 GDN + 6 full-attn)
#   - dense MLP (no MoE)
#   - vocab_size=32000, hidden=1024, ffn=2816, num_heads=16, num_kv_heads=2
#   - linear_attn (GDN): 4 key/value heads, head_dim=256, partial_rotary 0.25
#   - rms_norm_unit_offset=true (qwen3.5 style)
#
# Compared to the MoE template: same linear_attn FSDP entries (we have GDN
# layers), no ep_plan / mlp.experts entries (we don't have MoE experts).
# Compared to the pure-dense template: linear_attn entries are present.
#
# Pair with the MindSpeed-LLM bash launcher style (see scripts_qwen3_5/
# pretrain-exp4_qwen3_5_10b-a2b_optimized.sh) — same env-setup, just point
# the trainer at this yaml.

# 并行策略
parallel:
  tensor_parallel_size: 1
  fully_shard_parallel_size: 2                # FSDP shard size; must be a concrete int (auto is unsupported)
  fsdp_plan:
    apply_modules:
      - model.embed_tokens
      - model
      - model.layers.{*}
      - model.layers.{*}.linear_attn          # GDN mixer on linear_attention layers (0,1,2,4,5,6,...)
      - model.layers.{*}.self_attn            # full-attention mixer on layers (3,7,11,15,19,23)
      - lm_head
    hook_modules:
      - model.layers.{0-23}                   # 24 layers
    param_dtype: bf16
    reduce_dtype: fp32
    num_to_forward_prefetch: 1
    num_to_backward_prefetch: 1
  recompute: true
  recompute_plan:
    apply_modules:
      - model.layers.{0-23}                   # 24 layers
  ring_attention_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1                     # no MoE → EP=1

# 数据相关配置
data:
  dataset_param:
    dataset_type: huggingface
    attr:
      formatting: alpaca
      prompt: text
    preprocess_parameters:
      model_name_or_path: ./hf_models/alloy_qwen3_next_340m   # tokenizer pulled from the same dir
      use_fast_tokenizer: true
      split_special_tokens: false
      trust_remote_code: true                 # required for alloy custom modeling code
    basic_parameters:
      cutoff_len: 4096                        # = max_position_embeddings = SEQ_LENGTH
      template: default
      enable_thinking: false
      train_on_prompt: false
      mask_history: false
      dataset_dir: /path/to/your/data         # set me — e.g. fineweb-edu pre-tokenised parquet/json
      dataset: train_part1.json               # set me
      cache_dir: ./cache_dir/
      overwrite_cache: false
      preprocessing_batch_size: 8000
      preprocessing_num_workers: 32
      max_samples: null
      packing: true
      stage: pretrain

  dataloader_param:
    pin_memory: true
    shuffle: true
    dataloader_mode: sampler
    drop_last: true
    sampler_type: BaseRandomBatchSampler
    num_workers: 8
    collate_param:
      model_name: llm_pretrain
      ignore_pad_token_for_loss: true

# 模型配置
model:
  model_id: alloy
  model_name_or_path: ./hf_models/alloy_qwen3_next_340m
  trust_remote_code: true
  attn_implementation: sdpa                   # NPU sdpa = npu_fused_attention (= flash attention 2)
  freeze: []
  loss_cfg:
    loss_type: default
    router_aux_loss_coef: 0.0                 # no MoE router → no aux loss
  enable_chunk_loss: false
  chunkloss_plan:
    apply_module: lm_head
    chunk_size: 1024

  # ----- alloy runtime fast-path dispatch (forwarded onto transformer_config
  # by alloy.integrations.mindspeed_mm.overwrite_transformer_config) -----
  _qwen3_5_gdn_implementation: triton         # torch | triton | flash (binder-registered)
                                              # flip to "flash" once binder verified on hardware

# 训练配置
training:
  micro_batch_size: 8                         # = MBS in MindSpeed-LLM bash
  gradient_accumulation_steps: 1              # = GBS / (MBS * world_size); tune to your cluster
  seed: 42
  lr: 2.0e-3                                  # = LR
  lr_min: 2.0e-4                              # = MIN_LR
  lr_decay_style: cosine
  lr_warmup_ratio: 0.025                      # ~1000 / 38147 warmup steps
  weight_decay: 1.0e-1
  train_iters: 38147                          # = TRAIN_ITERS
  clip_grad: 1.0
  init_model_with_meta_device: true
  optimizer: adamw
  adam_fused: true
  save_interval: 19074                        # = SAVE_ITERS (every ~12hrs)
  save: ./intermediate_ckpt                   # = CKPT_SAVE_DIR
  use_deter_comp: false
  plugin:
    - alloy.integrations.mindspeed_mm
    - alloy.integrations.hf_npu_binder        # registers triton/flash fast paths
    - mindspeed_mm/fsdp/data/datasets/huggingface

# 工具配置
tools:
  profile:
    enable: false
    profile_type: static
    ranks: [0]
    static_param:
      level: level1
      with_stack: false
      with_memory: true
      record_shapes: false
      with_cpu: true
      save_path: ./profiling
      start_step: 10
      end_step: 11
      data_simplification: false
      aic_metrics_type: PipeUtilization
  memory_profile:
    enable: false
    start_step: 1
    end_step: 2
    save_path: ./memory_snapshot
    dump_ranks: [0]
    stacks: all
    max_entries: null
    mem_info: false
