# Pretraining yaml for an alloy qwen3-style dense model under MindSpeed-MM (FSDP2).
#
# Adapted from mindspeed_mm/scripts_qwen3_5/configs/qwen3_5_4B_config.yaml.
# Compared to the MoE/GDN variant (pretrain_alloy_qwen3_5_moe_mindspeed.yaml):
#
#   - No GDN layers → no linear_attn entries in the FSDP plan.
#   - No MoE → no experts entries, no ep_plan, no router_aux_loss.
#   - The dispatch fields are alloy-private: dense models still benefit from
#     binder-registered fast paths if alloy grows them, but this template only
#     declares the GDN field as a placeholder (set to ``torch`` since dense
#     qwen3 doesn't have GDN layers).

# 并行策略
parallel:
  tensor_parallel_size: 1
  fully_shard_parallel_size: auto
  fsdp_plan:
    apply_modules:
      - model.embed_tokens
      - model
      - model.layers.{*}
      - lm_head
    param_dtype: bf16
    reduce_dtype: fp32
  recompute: true
  recompute_plan:
    apply_modules:
      - model.layers.{0-5}                       # adjust to match num_hidden_layers
  ring_attention_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1

# 数据相关配置
data:
  dataset_param:
    dataset_type: huggingface
    attr:
      formatting: alpaca
      prompt: text
    preprocess_parameters:
      model_name_or_path: ./hf_models/alloy_qwen3_dense
      use_fast_tokenizer: true
      split_special_tokens: false
    basic_parameters:
      cutoff_len: 4096
      template: default
      enable_thinking: false
      train_on_prompt: false
      mask_history: false
      dataset_dir: /path/to/your/data            # set me
      dataset: train_part1.json                  # set me
      cache_dir: ./cache_dir/
      overwrite_cache: false
      preprocessing_batch_size: 1000
      preprocessing_num_workers: 16
      max_samples: null
      packing: true
      stage: pretrain

  dataloader_param:
    pin_memory: true
    shuffle: false
    dataloader_mode: sampler
    drop_last: true
    sampler_type: BaseRandomBatchSampler
    num_workers: 8
    collate_param:
      model_name: llm
      ignore_pad_token_for_loss: true

# 模型配置
model:
  model_id: alloy
  model_name_or_path: ./hf_models/alloy_qwen3_dense
  trust_remote_code: true
  attn_implementation: sdpa
  freeze: []
  loss_cfg:
    loss_type: default
    router_aux_loss_coef: 0.0
  enable_chunk_loss: false
  chunkloss_plan:
    apply_module: lm_head
    chunk_size: 1024

  # ----- alloy runtime fast-path dispatch (no GDN in this dense template, but
  # the field is declared for symmetry — set to torch since there's nothing
  # to swap. Add other _<module_key>_implementation fields here as alloy
  # grows new dispatch surfaces. -----
  _qwen3_5_gdn_implementation: torch

# 训练配置
training:
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  seed: 42
  lr: 4.0e-4
  lr_min: 4.0e-5
  lr_decay_style: cosine
  lr_warmup_ratio: 0.01
  weight_decay: 1.0e-1
  train_iters: 15000
  clip_grad: 1.0
  init_model_with_meta_device: true
  optimizer: adamw
  adam_fused: true
  save_interval: 10000
  save: /path/to/your/ckpt_out                    # set me
  use_deter_comp: false
  plugin:
    - alloy.integrations.mindspeed_mm
    - alloy.integrations.hf_npu_binder            # optional, only useful once alloy grows fast paths
    - mindspeed_mm/fsdp/data/datasets/huggingface

# 工具配置
tools:
  profile:
    enable: false
    profile_type: static
    ranks: [0]
    static_param:
      level: level1
      with_stack: false
      with_memory: false
      record_shapes: false
      with_cpu: true
      save_path: ./profiling
      start_step: 10
      end_step: 11
      data_simplification: false
      aic_metrics_type: PipeUtilization
  memory_profile:
    enable: false
    start_step: 1
    end_step: 2
    save_path: ./memory_snapshot
    dump_ranks: [0]
    stacks: all
    max_entries: null
    mem_info: false
